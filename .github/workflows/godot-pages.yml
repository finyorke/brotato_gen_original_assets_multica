name: Godot Pages Preview

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.2
  GODOT_RELEASE: stable

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -eux
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          unzip godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Install export templates
        run: |
          set -eux
          curl -L -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          unzip -j templates.tpz "templates/web*" -d "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"

      - name: Import and test
        run: |
          godot --headless --path . --import
          godot --headless --path . --script tests/run_tests.gd

      - name: Export Web
        run: |
          mkdir -p export/web
          touch export/.gdignore
          godot --headless --path . --export-release Web export/web/index.html
          touch export/web/.nojekyll
          for file in index.html index.js index.wasm index.pck; do
            test -f "export/web/$file" || { echo "Missing export/web/$file"; exit 1; }
          done

      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: export/web

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
